name: Build and test

on:
  push:
    branches: [ main ]
    paths:
    - 'src/**'
    - '*.xml'
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7
    - name: Set up JDK 17
      uses: actions/setup-java@v5
      with:
        distribution: 'temurin'
        java-version: 17
        cache: 'maven'
    - name: Build
      run: mvn -B clean package --file pom.xml
    - name: Integration test
      run: mvn -B failsafe:integration-test failsafe:verify --file pom.xml
  compatibility:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Keycloak 26.7.0 renamed OrganizationScope.SINGLE to SPECIFIC, so a jar built against
        # 26.7.0 hits NoSuchFieldError on older servers. This workflow builds the current sources,
        # hence 26.7.0 is the floor here. matrix.yml keeps the full range: it exercises previously
        # released extension jars, which were compiled against the Keycloak they run on.
        keycloak_version: [ 26.7.0, latest ]
        experimental: [false]
        include:
            - keycloak_version: nightly
              experimental: true
    continue-on-error: ${{ matrix.experimental }}
    steps:
      - uses: actions/checkout@v7
      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: 17
          cache: 'maven'
      - name: Compatibility tests
        run: mvn -B -U clean test-compile failsafe:integration-test failsafe:verify --file pom.xml -Dkeycloak.version=${{ matrix.keycloak_version }}
